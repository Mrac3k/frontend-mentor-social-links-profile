<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocLinkProfile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="social__card container">
            <img src="./assets/images/avatar-jessica.jpeg" alt="Profile Picture" class="profile__image">
            <div class="social__card-profileinfo">
                <h2 class="profile__name">Jessica Randall</h2>
                <h4 class="profile__bio">London, United Kingdom</h4>
                <p class="profile__info">Front-end developer and avid reader.</p>
            </div>

            <div class="social__card-links">
                <a href="https://www.github.com/jessica-randall" target="_blank" class="social__card-link">GitHub</a>
                <a href="https://www.frontendmentor.io/profile/jessica-randall" target="_blank" class="social__card-link">Frontend Mentor</a>
                <a href="https://www.linkedin.com/in/jessica-randall" target="_blank" class="social__card-link">LinkedIn</a>
                <a href="https://www.twitter.com/jessica-randall" target="_blank" class="social__card-link">Twitter</a>
                <a href="https://www.instagram.com/jessica-randall" target="_blank" class="social__card-link">Instagram</a>
            </div>

        </div>
    </main>
</body>
</html>
